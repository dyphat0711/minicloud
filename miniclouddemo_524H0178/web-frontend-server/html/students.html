<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .dashboard-header { background: #2c3e50; color: white; padding: 2rem 0; margin-bottom: 2rem; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="dashboard-header text-center">
    <h1>Hệ Thống Quản Lý Sinh Viên</h1>
    <p>Triển khai trên AWS EC2 - IP: 52.74.37.125</p>
</div>

<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="text-secondary">Danh sách sinh viên</h3>
                    <button class="btn btn-primary" onclick="fetchStudentData()">
                        Làm mới dữ liệu
                    </button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Mã SV</th>
                                <th>Họ và Tên</th>
                                <th>Ngày sinh</th>
                                <th>Chuyên ngành</th>
                            </tr>
                        </thead>
                        <tbody id="student-list">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function fetchStudentData() {
        const tbody = document.getElementById('student-list');
        tbody.innerHTML = '<tr><td colspan="4" class="text-center">Đang tải dữ liệu từ API...</td></tr>';

        try {
            // Gọi đến API thông qua Gateway (cùng IP nên dùng đường dẫn tương đối)
            const response = await fetch('/student/');
            const data = await response.json();

            tbody.innerHTML = '';
            data.forEach(student => {
                const row = `
                    <tr>
                        <td><strong>${student.student_id}</strong></td>
                        <td>${student.fullname}</td>
                        <td>${student.dob}</td>
                        <td><span class="badge bg-info text-dark">${student.major}</span></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Lỗi kết nối API! Vui lòng kiểm tra lại server.</td></tr>';
            console.error('Lỗi:', error);
        }
    }

    // Tự động tải dữ liệu khi mở trang
    window.onload = fetchStudentData;
</script>

</body>
</html>

events {}

http {
    # ==============================================================
    # Content-negotiation for /api/student
    # If browser sends Accept: text/html  →  serve HTML catalog page
    # Otherwise (curl, fetch, Postman)    →  proxy JSON from backend
    # ==============================================================
    map $http_accept $api_student_wants_html {
        default             0;
        "~*application/json" 0;
        "~*text/html"       1;
    }

    upstream frontend_upstream {
        server web-frontend-server1:80;
        server web-frontend-server2:80;
    }

    server {
        listen 80;

        # -----------------------------------------------------
        # Static website (default)
        # -----------------------------------------------------
        location / {
            proxy_pass http://web-frontend-server:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # Student — content negotiation (browser vs API client)
        # -----------------------------------------------------
        location = /api/student {
            # Browsers arriving with Accept: text/html → HTML catalog page
            if ($api_student_wants_html = 1) {
                rewrite ^ /catalog.html last;
            }
            # Anything else (fetch/curl/Postman) → JSON from backend
            proxy_pass http://application-backend-server:8081/student;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # App API — /api/* strips /api/ prefix
        # (kept AFTER the exact match above so /api/student can intercept)
        # -----------------------------------------------------
        location /api/ {
            proxy_pass http://application-backend-server:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # Keycloak
        # -----------------------------------------------------
        location /auth/ {
            proxy_pass http://authentication-identity-server:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # Legacy student path (backward compatible)
        # -----------------------------------------------------
        location /student/ {
            proxy_pass http://application-backend-server:8081/student/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # Load Balancer — round-robin
        # -----------------------------------------------------
        location /loadbalancer/ {
            proxy_pass http://frontend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

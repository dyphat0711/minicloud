events {}

http {
    # Docker embedded DNS — buộc re-resolve mỗi 10s
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_accept $api_student_wants_html {
        default              0;
        "~*application/json" 0;
        "~*text/html"        1;
    }

    upstream frontend_upstream {
        server web-frontend-server1:80;
        server web-frontend-server2:80;
    }

    server {
        listen 80;

        # ---- Static frontend ----
        location / {
            set $frontend "web-frontend-server";
            proxy_pass http://$frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Student content negotiation ----
        location = /api/student {
            if ($api_student_wants_html = 1) {
                rewrite ^ /catalog.html last;
            }
            set $backend "application-backend-server";
            proxy_pass http://$backend:8081/student;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- App API ----
        location /api/ {
            set $backend "application-backend-server";
            proxy_pass http://$backend:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Keycloak ----
        location /auth/ {
            set $keycloak "authentication-identity-server";
            proxy_pass http://$keycloak:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Legacy /student/ ----
        location /student/ {
            set $backend "application-backend-server";
            proxy_pass http://$backend:8081/student/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Load balancer (upstream không cần resolver) ----
        location /loadbalancer/ {
            proxy_pass http://frontend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

events {}

http {
    # Docker embedded DNS — re-resolve upstream names every 10s
    # (tránh 502 khi container upstream restart và đổi IP)
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream frontend_upstream {
        server web-frontend-server1:80;
        server web-frontend-server2:80;
    }

    server {
        listen 80;

        # -----------------------------------------------------
        # Static website (default)
        # -----------------------------------------------------
        location / {
            set $frontend "web-frontend-server";
            proxy_pass http://$frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # App API — /api/* always proxies to backend (JSON only)
        # Catalog UI now lives at /catalog.html (static)
        # -----------------------------------------------------
        location /api/ {
            set $backend "application-backend-server";
            proxy_pass http://$backend:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # Keycloak
        # -----------------------------------------------------
        location /auth/ {
            set $keycloak "authentication-identity-server";
            proxy_pass http://$keycloak:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # Legacy student path (backward compatible)
        # -----------------------------------------------------
        location /student/ {
            set $backend "application-backend-server";
            proxy_pass http://$backend:8081/student/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # Load Balancer — round-robin
        # -----------------------------------------------------
        location /loadbalancer/ {
            proxy_pass http://frontend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

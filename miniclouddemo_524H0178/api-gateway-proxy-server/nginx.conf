events {}

http {
    # Docker embedded DNS — re-resolve upstream names every 10s
    # (tránh 502 khi container upstream restart và đổi IP)
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream frontend_upstream {
        server web-frontend-server1:80;
        server web-frontend-server2:80;
    }

    server {
        listen 80;

        # -----------------------------------------------------
        # Static website (default)
        # -----------------------------------------------------
        location / {
            set $frontend "web-frontend-server";
            proxy_pass http://$frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # App API — /api/* always proxies to backend (JSON only)
        # Strip /api/ prefix so Flask receives /hello, /student, ...
        # (rewrite needed because proxy_pass with variable cannot
        #  substitute the location prefix automatically)
        # -----------------------------------------------------
        location /api/ {
            set $backend "application-backend-server";
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$backend:8081$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # Keycloak — strip /auth/ prefix
        # -----------------------------------------------------
        location /auth/ {
            set $keycloak "authentication-identity-server";
            rewrite ^/auth/(.*)$ /$1 break;
            proxy_pass http://$keycloak:8080$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # Legacy student path (pass-through, no rewrite)
        # -----------------------------------------------------
        location /student/ {
            set $backend "application-backend-server";
            proxy_pass http://$backend:8081$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------
        # Load Balancer — round-robin
        # -----------------------------------------------------
        location /loadbalancer/ {
            proxy_pass http://frontend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
